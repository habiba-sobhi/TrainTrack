
<div id="erd" style="padding: 1rem 0;"></div>
<style>
#erd svg { max-width: 100%; }
#erd svg .entityBox { stroke-width: 1px !important; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#e6f1fb',
    primaryBorderColor: dark ? '#185fa5' : '#378add',
    primaryTextColor: dark ? '#b5d4f4' : '#0c447c',
    secondaryColor: dark ? '#1c3d2e' : '#e1f5ee',
    secondaryBorderColor: dark ? '#0f6e56' : '#1d9e75',
    tertiaryColor: dark ? '#3d2a1a' : '#faeeda',
    tertiaryBorderColor: dark ? '#854f0b' : '#ba7517',
  },
});
const diagram = `erDiagram
  DEPARTMENT {
    int dept_id PK
    varchar dept_name
    int training_weeks
  }
  TRAINER {
    int trainer_id PK
    varchar first_name
    varchar last_name
    varchar email
  }
  BATCH {
    int batch_id PK
    varchar batch_name
    date start_date
    date end_date
    int trainer_id FK
    int dept_id FK
  }
  TRAINEE {
    int trainee_id PK
    varchar biometric_id
    varchar first_name
    varchar last_name
    int batch_id FK
    varchar status
  }
  ATTENDANCE {
    int attendance_id PK
    int trainee_id FK
    date record_date
    varchar att_status
  }
  QUIZ {
    int quiz_id PK
    int batch_id FK
    varchar quiz_name
    date quiz_date
  }
  QUIZ_ATTEMPT {
    int attempt_id PK
    int trainee_id FK
    int quiz_id FK
    decimal score
    varchar result
  }
  ROLE_PLAY {
    int rp_id PK
    int batch_id FK
    varchar rp_name
    date rp_date
  }
  RP_ATTEMPT {
    int attempt_id PK
    int trainee_id FK
    int rp_id FK
    varchar result
    text feedback
  }
  TEST_CALL {
    int tc_id PK
    int trainee_id FK
    int attempt_number
    varchar result
    varchar fail_reason
    date attempt_date
  }

  DEPARTMENT ||--o{ BATCH : has
  TRAINER ||--o{ BATCH : manages
  BATCH ||--o{ TRAINEE : contains
  TRAINEE ||--o{ ATTENDANCE : logs
  BATCH ||--o{ QUIZ : schedules
  TRAINEE ||--o{ QUIZ_ATTEMPT : takes
  QUIZ ||--o{ QUIZ_ATTEMPT : has
  BATCH ||--o{ ROLE_PLAY : schedules
  TRAINEE ||--o{ RP_ATTEMPT : takes
  ROLE_PLAY ||--o{ RP_ATTEMPT : has
  TRAINEE ||--o{ TEST_CALL : attempts
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
</script>
